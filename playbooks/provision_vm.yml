---
# Full VM provisioning playbook.
# Connects as the operator's existing sudo user, creates a temporary bootstrap user,
# sets up the permanent admin user and all services, then removes the bootstrap user.
#
# Required variables:
#   target              - inventory hostname of the VM to provision
#   initial_user        - existing sudo-capable user to connect with initially
#   initial_ssh_pass    - SSH password for the initial user (also used as sudo password)
#   admin_username      - username for the permanent admin user
#   deployer_ssh_key    - path to the deployer's SSH private key (public key installed on VM)
#
# Usage:
#   ansible-playbook playbooks/provision_vm.yml \
#     -e "target=gamevm-01 initial_user=ubuntu admin_username=gameadmin deployer_ssh_key=~/.ssh/id_ed25519" \
#     -e @/tmp/secrets.yaml   # contains initial_ssh_pass, initial_become_pass, admin_password

# Play 1: Connect as the operator's user, create bootstrap user
- name: Create bootstrap user
  hosts: "{{ target }}"
  become: true
  vars:
    ansible_user: "{{ initial_user }}"
    ansible_password: "{{ initial_ssh_pass }}"
    ansible_ssh_private_key_file: ~
    ansible_become_pass: "{{ initial_become_pass }}"
  roles:
    - bootstrap_user

# Play 2: Connect as bootstrap user (NOPASSWD sudo), create admin user and set up services
- name: Set up admin user and VM services
  hosts: "{{ target }}"
  become: true
  vars:
    ansible_user: gsdeploy_install
  roles:
    - admin_user
    - ufw
    - docker
    - node_exporter
    - cadvisor
    - promtail
  post_tasks:
    - name: Provisioning complete
      debug:
        msg: "Provisioning complete! Admin user '{{ admin_username }}' created."

# Play 3: Remove bootstrap user (connect as initial_user to avoid self-deletion)
- name: Clean up bootstrap user
  hosts: "{{ target }}"
  become: true
  vars:
    ansible_user: "{{ initial_user }}"
    ansible_password: "{{ initial_ssh_pass }}"
    ansible_ssh_private_key_file: ~
    ansible_become_pass: "{{ initial_become_pass }}"
  roles:
    - cleanup
