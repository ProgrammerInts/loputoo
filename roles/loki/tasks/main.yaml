---
- name: Add Grafana GPG key
  apt_key:
    url: https://apt.grafana.com/gpg.key
    state: present

- name: Add Grafana repo
  apt_repository:
    repo: "deb https://apt.grafana.com stable main"
    state: present
    filename: grafana

- name: Update APT cache
  apt:
    update_cache: yes
    cache_valid_time: 86400

- name: Install Loki
  apt:
    name: loki
    state: present

- name: Ensure Loki data directory exists with correct ownership
  file:
    path: /var/lib/loki
    state: directory
    owner: loki
    mode: "0750"

- name: Deploy Loki config
  template:
    src: loki-conf.yaml.j2
    dest: /etc/loki/config.yml
    owner: root
    group: root
    mode: "0644"
  notify: restart loki

- name: Ensure Loki is running
  service:
    name: loki
    state: started
    enabled: true
