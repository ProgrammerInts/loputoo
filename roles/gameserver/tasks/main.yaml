---
- name: Ensure /opt/gameservers exists with restricted permissions
  file:
    path: /opt/gameservers
    state: directory
    owner: root
    group: "{{ admin_username }}"
    mode: "0750"

- name: Look up admin user UID/GID
  ansible.builtin.getent:
    database: passwd
    key: "{{ admin_username }}"

- name: Set admin UID and GID facts
  set_fact:
    admin_uid: "{{ getent_passwd[admin_username][1] }}"
    admin_gid: "{{ getent_passwd[admin_username][2] }}"

- name: Deploy Minecraft server
  include_tasks: minecraft.yaml
  when: game_type == 'minecraft'

- name: Deploy Valheim server
  include_tasks: valheim.yaml
  when: game_type == 'valheim'

- name: Deploy Vintage Story server
  include_tasks: vintagestory.yaml
  when: game_type == 'vintagestory'

- name: Deploy Factorio server
  include_tasks: factorio.yaml
  when: game_type == 'factorio'
